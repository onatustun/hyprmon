name: Nix CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - fix-ci-attempt-2
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/nix-ci.yml'
      - 'nix/**'
  pull_request:
    branches: [main]
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/nix-ci.yml'
      - 'nix/**'

jobs:
  nix-ci:
    name: Check, Build & Update
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Run the Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Read required Go version from go.mod
        id: goversion
        run: |
          set -euo pipefail

          REQUIRED_GO="$(
            sed -nE 's/^go[[:space:]]+([0-9]+\.[0-9]+)$/\1/p' go.mod | head -n1
          )"

          if [ -z "${REQUIRED_GO}" ]; then
            echo "Could not determine Go version from go.mod"
            exit 1
          fi

          GO_ATTR="go_$(echo "$REQUIRED_GO" | tr '.' '_')"

          echo "required_go=${REQUIRED_GO}" >> "$GITHUB_OUTPUT"
          echo "go_attr=${GO_ATTR}" >> "$GITHUB_OUTPUT"

      - name: Check whether pinned nixpkgs has required Go
        id: checkgo
        run: |
          set -euo pipefail

          if nix eval --impure --raw --expr "
            let
              flake = builtins.getFlake (toString ./.);
              pkgs = import flake.inputs.nixpkgs {
                system = builtins.currentSystem;
              };
            in
              if builtins.hasAttr \"${{ steps.goversion.outputs.go_attr }}\" pkgs
              then \"yes\"
              else \"no\"
          " | grep -qx yes; then
            echo "needs_flake_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_flake_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update flake.lock
        if: >
          github.event_name == 'push' &&
          steps.checkgo.outputs.needs_flake_update == 'true'
        run: nix flake update --accept-flake-config

      - name: Regenerate gomod2nix.toml
        run: nix develop --accept-flake-config -c gomod2nix generate

      - name: Create PR with updated flake.lock and gomod2nix.toml
        if: github.event_name == 'push'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: |
            chore: update flake inputs and gomod2nix metadata
          title: |
            chore: update flake inputs and gomod2nix metadata
          body: |
            This PR was created automatically by CI.

            Updates included:
            - `flake.lock` if current pinned inputs did not provide Go `${{ steps.goversion.outputs.required_go }}`
            - regenerated `gomod2nix.toml`

            After these updates, CI runs `nix flake check` to verify everything still builds.
          branch: ci/update-nix-go-deps
          delete-branch: true
          add-paths: |
            flake.lock
            gomod2nix.toml

      - name: nix flake check
        run: nix flake check --accept-flake-config